<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>clier QA Reports</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#f4f6f9; color:#333; }
  .container { max-width:700px; margin:0 auto; padding:40px 20px; }
  h1 { font-size:22px; font-weight:700; margin-bottom:6px; }
  .subtitle { font-size:13px; color:#888; margin-bottom:32px; }
  .report-list { list-style:none; }
  .report-list li { background:#fff; border-radius:8px; margin-bottom:8px; box-shadow:0 1px 3px rgba(0,0,0,.06); overflow:hidden; }
  .report-list a { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; text-decoration:none; color:#333; transition:background .15s; }
  .report-list a:hover { background:#f8f9fa; }
  .report-date { font-size:15px; font-weight:600; }
  .report-file { font-size:12px; color:#888; font-family:monospace; }
  .loading { color:#888; font-size:14px; }
  .error { color:#e74c3c; font-size:14px; }
  .empty { color:#888; font-size:14px; font-style:italic; }
</style>
</head>
<body>
<div class="container">
  <h1>clier QA Reports</h1>
  <p class="subtitle">Automated QA results for the clier CLI</p>
  <ul class="report-list" id="list">
    <li class="loading">Loading reports...</li>
  </ul>
</div>
<script>
(async () => {
  const list = document.getElementById('list');
  try {
    const res = await fetch('https://api.github.com/repos/jakeraft/clier-qa/contents/reports');
    if (!res.ok) throw new Error(res.statusText);
    const files = await res.json();
    const htmlFiles = files
      .filter(f => f.name.endsWith('.html'))
      .sort((a, b) => b.name.localeCompare(a.name));

    if (htmlFiles.length === 0) {
      list.innerHTML = '<li class="empty">No reports yet.</li>';
      return;
    }

    list.innerHTML = htmlFiles.map(f => {
      const name = f.name.replace('.html', '');
      const display = name.replace('T', ' ').replace(/(\d{2})(\d{2})(\d{2})$/, '$1:$2:$3');
      return `<li><a href="reports/${f.name}"><span class="report-date">${display}</span><span class="report-file">${f.name}</span></a></li>`;
    }).join('');
  } catch (e) {
    list.innerHTML = `<li class="error">Failed to load reports: ${e.message}</li>`;
  }
})();
</script>
</body>
</html>
